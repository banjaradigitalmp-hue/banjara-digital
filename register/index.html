<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{font-family:Poppins;margin:0;background:#020617;color:#fff;}
.banner img{width:100%;}
.headerCard{background:#fff;margin:15px;padding:20px;border-radius:15px;color:#000;text-align:center;}
.container{max-width:720px;margin:auto;background:#111827;padding:20px;border-radius:15px;}
input,select{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px;}
.pay{background:#2563eb;color:#fff;}
.partnerCard{background:#fff;margin:20px;padding:20px;text-align:center;color:#000;border-radius:15px;}
.logoCircle{width:90px;height:90px;border-radius:50%;}
.note{font-size:13px;color:#94a3b8;margin-top:5px;}
</style>

</head>

<body>

<!-- HEADER -->
<div class="headerCard">
<h2>Student Success Meet 2026-27</h2>
<p>आयोजक: म.प्र. NGO महासंघ</p>
</div>

<!-- FORM -->
<div class="container">

<input id="name" placeholder="Student Name">
<input id="parent" placeholder="Parent Name">
<input type="date" id="dob">
<input id="mobile" placeholder="Mobile">

<select id="caste">
<option>SC</option><option>ST</option><option>OBC</option><option>Other</option>
</select>

<select id="stream" onchange="updateCourses()">
<option value="">Select Stream</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
</select>

<select id="course">
<option>Select Course</option>
</select>

<input id="college" placeholder="Future College">

<p>₹21 Exam Fee – Free Food + Token + Medal + Certificate</p>

<button class="pay" onclick="startPayment()">Pay & Register</button>

<p class="note">
Payment के बाद आगे की जानकारी के लिए WhatsApp Group join करें
</p>

</div>

<!-- DIGITAL PARTNER -->
<div class="partnerCard">
<h3>Digital Partner</h3>
<img src="https://github.com/banjaradigitalmp-hue/banjara-digital/blob/main/WhatsApp%20Image%202026-03-06%20at%206.52.34%20PM.jpeg?raw=true" class="logoCircle">
<h2>Banjara Digital</h2>
</div>

<script>

/* STREAM BASED COURSES */
function updateCourses(){
let stream = document.getElementById("stream").value;
let course = document.getElementById("course");

course.innerHTML = "";

if(stream=="Science"){
course.innerHTML += "<option>MBBS</option><option>B.Tech</option><option>BSc</option>";
}
if(stream=="Commerce"){
course.innerHTML += "<option>B.Com</option><option>CA</option><option>CS</option>";
}
if(stream=="Arts"){
course.innerHTML += "<option>BA</option><option>LLB</option><option>UPSC</option>";
}
}

/* PAYMENT */
function startPayment(){

var options = {
key: "rzp_live_SZnaVX76WrMx4H",
amount: 2100,

handler: function (response){

fetch("https://script.google.com/macros/s/AKfycbyAU5OsgXmi_lZqCeGYn5YjiuKd-GCbObx2Hpr05YVKKykOrVhSLKajurqSNbBzZAgGkg/exec", {
method:"POST",
body: JSON.stringify({
name: name.value,
parent: parent.value,
dob: dob.value,
mobile: mobile.value,
caste: caste.value,
stream: stream.value,
course: course.value,
college: college.value,
payment_id: response.razorpay_payment_id
})
});

/* SUCCESS + WHATSAPP */
if(confirm("Payment Successful ✅\nWhatsApp Group join karna hai?")){
window.open("https://chat.whatsapp.com/F6pAgLGdTcu5soecJMh3F0");
}

}
};

new Razorpay(options).open();

}

</script>

</body>
</html>
