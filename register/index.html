<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{font-family:'Poppins';margin:0;background:#020617;color:#fff;}
.banner img{width:100%;}
.headerCard{background:#fff;margin:15px;padding:25px;border-radius:18px;text-align:center;color:#000;}
.container{max-width:720px;margin:auto;background:#111827;padding:20px;border-radius:15px;}
input,select{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px;}
.pay{background:#2563eb;color:#fff;}
.partnerCard{background:#fff;margin:20px;padding:20px;text-align:center;color:#000;border-radius:15px;}
.logoCircle{width:90px;height:90px;border-radius:50%;}
</style>

</head>

<body>

<div class="banner">
<img src="https://github.com/banjaradigitalmp-hue/student-form/blob/main/WhatsApp%20Image%202026-04-04%20at%209.41.57%20AM.jpeg?raw=true">
</div>

<div class="headerCard">
<h2>Student Success Meet 2026-27</h2>
<p>आयोजक: म.प्र. NGO महासंघ</p>
</div>

<div class="container">

<input id="name" placeholder="Student Name / छात्र का नाम" required>
<input id="parent" placeholder="Parent Name">
<input type="date" id="dob">
<input id="mobile" placeholder="Mobile" required>

<select id="caste">
<option>SC</option><option>ST</option><option>OBC</option><option>Other</option>
</select>

<select id="district">
<option>Indore</option><option>Bhopal</option><option>Ujjain</option>
<option>Jabalpur</option><option>Gwalior</option><option>Sagar</option>
</select>

<input id="school" placeholder="School">

<select id="stream" onchange="updateCourse()">
<option value="">Select Stream</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
</select>

<select id="course">
<option>Select Course</option>
</select>

<input id="college" placeholder="Future College">

<select id="career">
<option>Doctor</option><option>Engineer</option><option>Govt Job</option>
</select>

<select id="travel">
<option>Self</option><option>Bus</option><option>Public</option>
</select>

<select id="scholarship">
<option>Yes</option><option>No</option>
</select>

<select id="health">
<option>Yes</option><option>No</option>
</select>

<input id="parent1" placeholder="Parent Mobile 1">
<input id="parent2" placeholder="Parent Mobile 2">

<p>₹21 Exam Fee – Free Food + Token + Medal + Certificate</p>

<button class="pay" onclick="startPayment()">Pay & Register</button>

<p style="font-size:12px;">
Payment के बाद आगे के update के लिए WhatsApp group join करें
</p>

</div>

<div class="partnerCard">
<h3>Digital Partner</h3>
<img src="https://github.com/banjaradigitalmp-hue/banjara-digital/blob/main/WhatsApp%20Image%202026-03-06%20at%206.52.34%20PM.jpeg?raw=true" class="logoCircle">
<h2>Banjara Digital</h2>
</div>

<script>

/* STREAM → COURSE */
function updateCourse(){
let stream=document.getElementById("stream").value;
let course=document.getElementById("course");

let options={
Science:["MBBS","BSc","Engineering","Pharmacy"],
Commerce:["BCom","CA","CS","BBA"],
Arts:["BA","LLB","Journalism","UPSC"]
};

course.innerHTML="";
options[stream].forEach(c=>{
let opt=document.createElement("option");
opt.text=c;
course.add(opt);
});
}

/* PAYMENT */
function startPayment(){

if(name.value=="" || mobile.value=="" || stream.value==""){
alert("Please fill form");
return;
}

var options={
key:"rzp_live_SZnaVX76WrMx4H",
amount:2100,
currency:"INR",

handler:function(response){

fetch("https://script.google.com/macros/s/AKfycbyAU5OsgXmi_lZqCeGYn5YjiuKd-GCbObx2Hpr05YVKKykOrVhSLKajurqSNbBzZAgGkg/exec",{
method:"POST",
body:JSON.stringify({
name:name.value,
parent:parent.value,
dob:dob.value,
mobile:mobile.value,
caste:caste.value,
district:district.value,
school:school.value,
stream:stream.value,
course:course.value,
college:college.value,
career:career.value,
travel:travel.value,
scholarship:scholarship.value,
health:health.value,
parent1:parent1.value,
parent2:parent2.value,
payment_id:response.razorpay_payment_id
})
});

alert("Payment Successful ✅");

if(confirm("WhatsApp Group join kare?")){
window.open("https://chat.whatsapp.com/F6pAgLGdTcu5soecJMh3F0");
}

}
};

new Razorpay(options).open();
}
</script>

</body>
</html>
