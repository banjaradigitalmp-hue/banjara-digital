<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet 2026-27</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins';margin:0;background:#f1f5f9;}
.container{
max-width:600px;margin:20px auto;background:white;padding:20px;border-radius:12px;
}

input,select{
width:100%;padding:12px;margin-top:8px;border-radius:8px;border:1px solid #ccc;
}

button{
width:100%;padding:14px;margin-top:12px;border:none;border-radius:10px;
background:#2563eb;color:white;font-size:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Registration Form</h2>

<input id="name" placeholder="Full Name">
<input id="dob" type="date">

<select id="state">
<option>Select State</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Rajasthan</option>
<option>Gujarat</option>
<option>Other</option>
</select>

<select id="district">
<option>Select District (MP)</option>
<option>Indore</option>
<option>Bhopal</option>
<option>Ujjain</option>
<option>Gwalior</option>
<option>Jabalpur</option>
<option>Dhar</option>
<option>Khandwa</option>
<option>Khargone</option>
<option>Ratlam</option>
<option>Dewas</option>
<option>Sehore</option>
<option>Vidisha</option>
<option>Other</option>
</select>

<input id="mobile" placeholder="Mobile Number">
<input id="school" placeholder="School Name">

<select id="stream">
<option>Select Stream</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
</select>

<input id="college" placeholder="College Name">
<input id="career" placeholder="Career Goal">

<select id="travel">
<option>Travel</option>
<option>Yes</option>
<option>No</option>
</select>

<select id="scholarship">
<option>Scholarship</option>
<option>Yes</option>
<option>No</option>
</select>

<input id="health" placeholder="Health Issue">
<input id="contact1" placeholder="Parent Contact 1">
<input id="contact2" placeholder="Parent Contact 2">

<button onclick="payNow()">Pay & Register</button>

</div>

<script>
function payNow(){

var data={
name:document.getElementById("name").value,
dob:document.getElementById("dob").value,
state:document.getElementById("state").value,
district:document.getElementById("district").value,
mobile:document.getElementById("mobile").value,
school:document.getElementById("school").value,
stream:document.getElementById("stream").value,
college:document.getElementById("college").value,
career:document.getElementById("career").value,
travel:document.getElementById("travel").value,
scholarship:document.getElementById("scholarship").value,
health:document.getElementById("health").value,
contact1:document.getElementById("contact1").value,
contact2:document.getElementById("contact2").value
};

if(data.name=="" || data.mobile==""){
alert("Fill required fields");
return;
}

var options={
"key":"YOUR_API_KEY",
"amount":"2100",
"currency":"INR",

"handler":function(){

fetch("YOUR_SCRIPT_URL",{
method:"POST",
body:JSON.stringify(data)
});

window.location.href="https://chat.whatsapp.com/YOUR_GROUP_LINK";

}
};

new Razorpay(options).open();
}
</script>

</body>
</html>
