<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#071126;
  color:#fff;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:15px;
}

h1{font-size:28px;}

.card{
  background:#0b1b3a;
  padding:20px;
  border-radius:12px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  background:#47d7ff;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.status{
  margin-top:10px;
}

@media(max-width:600px){
  h1{font-size:22px;}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Student Registration</h1>

    <form id="form">

      <label>नाम</label>
      <input id="name" required>

      <label>मोबाइल</label>
      <input id="mobile" maxlength="10" required>

      <label>Stream</label>
      <select id="stream" required>
        <option value="">Select</option>
        <option>Science</option>
        <option>Commerce</option>
        <option>Arts</option>
      </select>

      <label>Course</label>
      <select id="course" required></select>

      <button type="submit">Pay ₹21</button>

      <div class="status" id="status"></div>

    </form>
  </div>
</div>

<script>

const courseMap = {
  Science:["MBBS","BSc","Engineering"],
  Commerce:["BCom","CA","BBA"],
  Arts:["BA","LLB"]
};

const stream = document.getElementById("stream");
const course = document.getElementById("course");
const form = document.getElementById("form");
const statusBox = document.getElementById("status");

// ✅ Course Fix
function updateCourse(){
  let val = stream.value;
  course.innerHTML="";

  if(!courseMap[val]) return;

  courseMap[val].forEach(c=>{
    let op = document.createElement("option");
    op.textContent=c;
    course.appendChild(op);
  });
}

stream.addEventListener("change",updateCourse);

// ✅ Payment
form.addEventListener("submit",function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const mobile = document.getElementById("mobile").value;

  if(mobile.length!==10){
    statusBox.innerText="10 digit mobile daalo";
    return;
  }

  const rzp = new Razorpay({
    key:"rzp_live_SZnaVX76WrMx4H",
    amount:2100,
    currency:"INR",
    name:"Student Meet",
    handler:function(res){
      statusBox.innerText="Payment Success: "+res.razorpay_payment_id;
    }
  });

  rzp.open();
});

</script>

</body>
</html>
