<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet 2026-27</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:#f1f5f9;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    text-align:center;
    padding-bottom:20px;
}

.header img{
    width:100%;
    height:auto;
    object-fit:contain;
}

/* EVENT */
.event-box{
    background:#ffffff20;
    margin:15px;
    padding:12px;
    border-radius:10px;
}

/* CONTAINER */
.container{
    max-width:600px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input,select{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    color:white;
    font-size:15px;
    cursor:pointer;
}

.pay{background:#2563eb;}
.map{background:#16a34a;}

/* FOOTER */
.footer{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<img src="https://github.com/banjaradigitalmp-hue/student-form/blob/main/WhatsApp%20Image%202026-04-04%20at%209.41.57%20AM.jpeg?raw=true">

<h1>Student Success Meet 2026-27</h1>

<p>आयोजन: म.प्र. NGO महासंघ</p>

<div class="event-box">
<p>📅 10 May 2026</p>
<p>⏰ 10:00 AM</p>
<p>📍 आनंद मोहन माथुर सभागृह, विजयनगर, इंदौर</p>
</div>

<a href="https://www.google.com/maps/search/?api=1&query=Indore" target="_blank">
<button class="btn map">📍 Location</button>
</a>

</div>

<!-- FORM -->
<div class="container">

<h2>Registration Form</h2>

<input id="name" placeholder="Full Name">
<input id="dob" placeholder="Date of Birth">
<input id="mobile" placeholder="Mobile Number">
<input id="school" placeholder="School Name">
<input id="district" placeholder="District">

<select id="stream">
<option>Stream</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
</select>

<input id="college" placeholder="College Name">
<input id="career" placeholder="Career Goal">
<input id="travel" placeholder="Travel (Yes/No)">
<input id="scholarship" placeholder="Scholarship (Yes/No)">
<input id="health" placeholder="Health Issue (if any)">
<input id="contact1" placeholder="Parent Contact 1">
<input id="contact2" placeholder="Parent Contact 2">

<p style="color:green;font-weight:bold;">
₹21 Registration Fee (Food + Medal + Certificate)
</p>

<button class="btn pay" onclick="payNow()">Pay & Register</button>

</div>

<!-- PARTNER -->
<div class="container" style="text-align:center;">
<p>Digital Partner</p>
<h3>Banjara Digital</h3>
</div>

<!-- FOOTER -->
<div class="footer">
<p>© 2026 Banjara Digital</p>
</div>

<script>
function payNow(){

var data = {
name:document.getElementById("name").value,
dob:document.getElementById("dob").value,
mobile:document.getElementById("mobile").value,
school:document.getElementById("school").value,
district:document.getElementById("district").value,
stream:document.getElementById("stream").value,
college:document.getElementById("college").value,
career:document.getElementById("career").value,
travel:document.getElementById("travel").value,
scholarship:document.getElementById("scholarship").value,
health:document.getElementById("health").value,
contact1:document.getElementById("contact1").value,
contact2:document.getElementById("contact2").value
};

if(data.name=="" || data.mobile==""){
alert("Please fill required details");
return;
}

var options = {
"key": "YOUR_API_KEY",
"amount": "2100",
"currency": "INR",
"name": "Student Meet",

"handler": function (){

fetch("YOUR_SCRIPT_URL", {
method: "POST",
body: JSON.stringify(data)
});

// WhatsApp redirect
window.location.href="https://chat.whatsapp.com/YOUR_GROUP_LINK";

}
};

var rzp = new Razorpay(options);
rzp.open();
}
</script>

</body>
</html>
