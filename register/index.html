<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{font-family:'Poppins';margin:0;background:#020617;color:#fff;}

.banner img{width:100%;}

.headerCard{
background:#fff;margin:15px;padding:20px;border-radius:15px;text-align:center;color:#000;
}

.container{
max-width:720px;margin:auto;background:#111827;padding:20px;border-radius:15px;
}

input,select{
width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;
}

button{
width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px;
}

.pay{background:#2563eb;color:#fff;}
.whatsapp{background:#25D366;color:#fff;}

.partnerCard{
background:#fff;margin:20px;padding:20px;text-align:center;color:#000;border-radius:15px;
}

.logoCircle{
width:90px;height:90px;border-radius:50%;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}
</style>

</head>

<body>

<!-- BANNER -->
<div class="banner">
<img src="https://github.com/banjaradigitalmp-hue/student-form/blob/main/WhatsApp%20Image%202026-04-04%20at%209.41.57%20AM.jpeg?raw=true">
</div>

<div class="headerCard">
<h2>Student Success Meet 2026-27</h2>
<p>आयोजक: म.प्र. NGO महासंघ</p>
</div>

<div class="container">

<input id="name" placeholder="Student Name">
<input id="mobile" placeholder="Mobile">
<select id="district">
<option>Indore</option><option>Bhopal</option>
</select>

<select id="career">
<option>Doctor</option><option>Engineer</option>
</select>

<p>₹21 Exam Fee – Free Food + Medal + Certificate</p>

<button class="pay" onclick="payNow()">Pay & Register</button>

</div>

<!-- DIGITAL PARTNER -->
<div class="partnerCard">
<h3>Digital Partner</h3>
<img src="https://github.com/banjaradigitalmp-hue/banjara-digital/blob/main/WhatsApp%20Image%202026-03-06%20at%206.52.34%20PM.jpeg?raw=true" class="logoCircle">
<h2>Banjara Digital</h2>
<p>CONNECT • CREATE • GROW</p>
</div>

<script>

function payNow(){

if(name.value=="" || mobile.value==""){
alert("Fill details");
return;
}

var options = {
key: "rzp_live_SZnaVX76WrMx4H",
amount: 2100,
currency: "INR",

handler: function (){

// 🔥 SEND DATA TO GOOGLE SHEET
fetch("https://script.google.com/macros/s/AKfycbyEm3UowaIdD1M8nDcWks67yV05o64pyF3kEHFfSQL4bbosQ9hzx0GuZmv06fceAuFAGg/exec", {
method:"POST",
body: JSON.stringify({
name: name.value,
mobile: mobile.value,
district: district.value,
career: career.value
})
});

// SUCCESS MESSAGE
alert("Payment Successful ✅");

// WHATSAPP POPUP
if(confirm("Join WhatsApp Group?")){
window.open("https://chat.whatsapp.com/F6pAgLGdTcu5soecJMh3F0");
}

}
};

new Razorpay(options).open();

}

</script>

</body>
</html>
