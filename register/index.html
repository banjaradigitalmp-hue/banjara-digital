<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{font-family:sans-serif;background:#071126;color:#fff;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#0b1b3a;padding:20px;border-radius:10px}
input,select{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none}
button{width:100%;padding:14px;background:#47d7ff;border:none;border-radius:10px;font-weight:bold}
.hidden{display:none}
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.7);
display:none;justify-content:center;align-items:center
}
.popup-box{background:#fff;color:#000;padding:20px;border-radius:10px}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Student Registration</h2>

<form id="form">

<input id="name" placeholder="Student Name" required>
<input id="mobile" placeholder="Mobile" maxlength="10" required>

<select id="stream" required>
<option value="">Stream</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
</select>

<select id="course" required></select>

<input id="otherCourse" class="hidden" placeholder="Other Course">

<select id="career">
<option>Doctor</option>
<option>Engineer</option>
<option>Other</option>
</select>

<input id="otherCareer" class="hidden" placeholder="Other Career">

<button type="submit">Pay ₹21</button>

<div id="status"></div>

</form>
</div>
</div>

<!-- ✅ Popup -->
<div class="popup" id="popup">
<div class="popup-box">
<h3>Payment Success</h3>
<p id="receipt"></p>
<a href="https://chat.whatsapp.com/F6pAgLGdTcu5soecJMh3F0" target="_blank">
<button>Join WhatsApp</button>
</a>
</div>
</div>

<script>

// CONFIG
const CONFIG={
key:"YOUR_RAZORPAY_KEY",
sheetURL:"YOUR_SCRIPT_URL"
};

// DATA
const courseMap={
Science:["MBBS","BSc","Engineering","Other"],
Commerce:["BCom","CA","BBA","Other"],
Arts:["BA","LLB","Other"]
};

const stream=document.getElementById("stream");
const course=document.getElementById("course");
const otherCourse=document.getElementById("otherCourse");
const career=document.getElementById("career");
const otherCareer=document.getElementById("otherCareer");

// Course load
stream.onchange=()=>{
course.innerHTML="";
courseMap[stream.value].forEach(c=>{
let op=document.createElement("option");
op.textContent=c;
course.appendChild(op);
});
};

// Other course
course.onchange=()=>{
otherCourse.classList.toggle("hidden",course.value!=="Other");
};

// Other career
career.onchange=()=>{
otherCareer.classList.toggle("hidden",career.value!=="Other");
};

// Submit
document.getElementById("form").onsubmit=function(e){
e.preventDefault();

let data={
name:name.value,
mobile:mobile.value,
stream:stream.value,
course:course.value==="Other"?otherCourse.value:course.value,
career:career.value==="Other"?otherCareer.value:career.value
};

if(data.mobile.length!==10){
status.innerText="Mobile 10 digit hona chahiye";
return;
}

// Razorpay
let rzp=new Razorpay({
key:CONFIG.key,
amount:2100,
handler:function(res){

// Google Sheet
fetch(CONFIG.sheetURL,{
method:"POST",
body:JSON.stringify({...data,payment:res.razorpay_payment_id})
});

// Popup
document.getElementById("popup").style.display="flex";
document.getElementById("receipt").innerText=
"Name: "+data.name+" | Payment: "+res.razorpay_payment_id;

}
});

rzp.open();

};

</script>

</body>
</html>
