<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
font-family:'Poppins';
margin:0;
background:#020617;
color:#fff;
}

/* HEADER */
.header{
background:#fff;
color:#000;
padding:20px;
text-align:center;
}

/* FORM */
.container{
max-width:700px;
margin:auto;
padding:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
}

.pay{
background:#2563eb;
color:#fff;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:13px;
}
</style>

</head>

<body>

<div class="header">
<h2>Student Success Meet 2026-27</h2>
<p>आयोजक: म.प्र. NGO महासंघ</p>
</div>

<div class="container">

<input id="name" placeholder="Student Name / छात्र का नाम">
<input id="mobile" placeholder="Mobile / मोबाइल">

<!-- STREAM -->
<select id="stream" onchange="loadCourse()">
<option value="">Stream चुनें</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
<option>Maths</option>
<option>Other</option>
</select>

<!-- COURSE -->
<select id="course" onchange="checkOtherCourse()"></select>

<input id="otherCourse" placeholder="Other Course लिखें" style="display:none">

<p>₹21 Exam Fee – Free Food + Token + Medal + Certificate</p>

<button class="pay" onclick="payNow()">💳 Pay & Register</button>

<p style="font-size:12px;">
Payment के बाद WhatsApp group join करें
</p>

</div>

<div class="footer">
<p>© 2026 Banjara Digital</p>
</div>

<script>

/* STREAM → COURSE */
function loadCourse(){
let s=document.getElementById("stream").value;
let c=document.getElementById("course");

let data={
Science:["MBBS","BSc","Engineering","Other"],
Commerce:["BCom","CA","BBA","Other"],
Arts:["BA","LLB","UPSC","Other"],
Maths:["BSc Maths","Data Science","Other"],
Other:["Other"]
};

c.innerHTML="";

if(!data[s]) return;

data[s].forEach(x=>{
let o=document.createElement("option");
o.text=x;
c.add(o);
});
}

/* OTHER COURSE */
function checkOtherCourse(){
let course=document.getElementById("course").value;
document.getElementById("otherCourse").style.display =
(course==="Other") ? "block":"none";
}

/* PAYMENT */
function payNow(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let stream=document.getElementById("stream").value;
let course=document.getElementById("course").value;
let otherCourse=document.getElementById("otherCourse").value;

if(name=="" || mobile==""){
alert("पहले form भरें");
return;
}

let finalCourse = (course==="Other") ? otherCourse : course;

var options={
key:"YOUR_RAZORPAY_KEY", // 🔴 यहाँ अपनी key डालो
amount:2100,
currency:"INR",

handler:function(response){

fetch("https://script.google.com/macros/s/AKfycbz61bYG939JPxIt8KsG2SvCL08kYz1HWyc8O7ks-nGS9Mbn4Zd5X7KoZZt2BWXEwwaCgQ/exec",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
mobile:mobile,
stream:stream,
course:finalCourse,
payment_id:response.razorpay_payment_id
})
})
.then(()=>{
alert("Payment Successful ✅");

if(confirm("WhatsApp Group join करना है?")){
window.open("https://chat.whatsapp.com/F6pAgLGdTcu5soecJMh3F0");
}
})
.catch(()=>{
alert("Data save error ❌");
});

}
};

new Razorpay(options).open();
}

</script>

</body>
</html>
