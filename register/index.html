<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
font-family:'Poppins';
margin:0;
background:#020617;
color:#fff;
}

.banner img{width:100%;}

.headerCard{
background:#fff;
color:#000;
margin:15px;
padding:20px;
border-radius:15px;
text-align:center;
}

.eventInfo{
background:#f1f5f9;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.mapBtn{
background:#16a34a;
color:#fff;
padding:10px;
border:none;
border-radius:8px;
width:100%;
margin-top:10px;
}

.container{
max-width:720px;
margin:auto;
background:#111827;
padding:20px;
border-radius:15px;
}

label{margin-top:10px;display:block;}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:none;
}

.pay{background:#2563eb;color:#fff;}
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
}

.partnerCard{
background:#fff;
color:#000;
margin:20px;
padding:20px;
text-align:center;
border-radius:15px;
}

.logoCircle{
width:90px;
height:90px;
border-radius:50%;
box-shadow:0 0 20px #000;
}

.footer{
text-align:center;
padding:20px;
font-size:13px;
}
.footer a{color:#38bdf8;}
</style>

</head>

<body>

<div class="banner">
<img src="https://github.com/banjaradigitalmp-hue/student-form/blob/main/WhatsApp%20Image%202026-04-04%20at%209.41.57%20AM.jpeg?raw=true">
</div>

<div class="headerCard">
<h2>Student Success Meet 2026-27</h2>
<h3>आयोजक: म.प्र. NGO महासंघ</h3>

<div class="eventInfo">
📅 10 May 2026 <br>
⏰ 10:00 AM <br>
📍 आनंद मोहन माथुर सभागृह, इंदौर
</div>

<button class="mapBtn" onclick="openMap()">📍 View Location</button>
</div>

<div class="container">

<label>Student Name</label>
<input id="name">

<label>Mobile</label>
<input id="mobile">

<label>Stream</label>
<select id="stream" onchange="updateCourse()">
<option value="">Select</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
<option>Maths</option>
<option>Other</option>
</select>

<label>Course</label>
<select id="course" onchange="checkOtherCourse()"></select>

<input id="otherCourse" placeholder="Write Course" style="display:none;">

<button class="pay" onclick="startPayment()">Pay & Register</button>

</div>

<div class="partnerCard">
<h3>Digital Partner</h3>
<img src="https://github.com/banjaradigitalmp-hue/banjara-digital/blob/main/WhatsApp%20Image%202026-03-06%20at%206.52.34%20PM.jpeg?raw=true" class="logoCircle">
<h2>Banjara Digital</h2>
</div>

<div class="footer">
<p>© 2026 Banjara Digital</p>
</div>

<script>

/* MAP */
function openMap(){
window.open("https://www.google.com/maps/search/?api=1&query=Anand+Mohan+Mathur+Sabhagrah+Indore");
}

/* COURSE FIX */
function updateCourse(){
let data={
Science:["MBBS","BSc","Engineering","Other"],
Commerce:["BCom","CA","BBA","Other"],
Arts:["BA","LLB","UPSC","Other"],
Maths:["BSc Maths","Data Science","Other"],
Other:["Other"]
};

course.innerHTML="";

data[stream.value].forEach(c=>{
let o=document.createElement("option");
o.text=c;
course.add(o);
});
}

function checkOtherCourse(){
if(course.value=="Other"){
otherCourse.style.display="block";
}else{
otherCourse.style.display="none";
}
}

/* PAYMENT + SHEET FIX */
function startPayment(){

if(name.value=="" || mobile.value==""){
alert("Please fill required details");
return;
}

var finalCourse = (course.value=="Other") ? otherCourse.value : course.value;

var options={
key:"rzp_live_SZnaVX76WrMx4H",
amount:2100,
currency:"INR",

handler:function(res){

fetch("https://script.google.com/macros/s/AKfycbz61bYG939JPxIt8KsG2SvCL08kYz1HWyc8O7ks-nGS9Mbn4Zd5X7KoZZt2BWXEwwaCgQ/exec",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name.value,
mobile:mobile.value,
stream:stream.value,
course:finalCourse,
payment_id:res.razorpay_payment_id
})
})
.then(response=>response.text())
.then(data=>{

alert("Payment Successful ✅");

setTimeout(()=>{
if(confirm("WhatsApp Group join kare?")){
window.open("https://chat.whatsapp.com/F6pAgLGdTcu5soecJMh3F0");
}
},500);

})
.catch(err=>{
alert("Error saving data ❌");
});

}
};

new Razorpay(options).open();
}

</script>

</body>
</html>
