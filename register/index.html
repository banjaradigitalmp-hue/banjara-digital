<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{font-family:'Poppins';margin:0;background:#020617;color:#fff;}
.banner img{width:100%;}
.header{background:#fff;color:#000;padding:20px;text-align:center;border-radius:10px;margin:10px;}
.container{max-width:750px;margin:auto;padding:20px;background:#111827;border-radius:10px;}
input,select{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:8px;}
.pay{background:#2563eb;color:#fff;}
.footer{text-align:center;padding:20px;font-size:13px;}
.footer a{color:#38bdf8;}
</style>

</head>

<body>

<!-- BANNER -->
<div class="banner">
<img src="https://github.com/banjaradigitalmp-hue/student-form/blob/main/WhatsApp%20Image%202026-04-04%20at%209.41.57%20AM.jpeg?raw=true">
</div>

<!-- HEADER -->
<div class="header">
<h2>Student Success Meet 2026-27</h2>
<p>आयोजक: म.प्र. NGO महासंघ</p>
<p>📅 10 May 2026 | ⏰ 10:00 AM</p>
<p>📍 आनंद मोहन माथुर सभागृह, इंदौर</p>
</div>

<!-- FORM -->
<div class="container">

<input id="name" placeholder="Student Name / छात्र का नाम">
<input id="parent" placeholder="Parent Name / अभिभावक">
<input type="date" id="dob">
<input id="mobile" placeholder="Mobile / मोबाइल">

<select id="caste">
<option>SC</option><option>ST</option><option>OBC</option><option>Other</option>
</select>

<select id="district">
<option>Indore</option><option>Bhopal</option><option>Ujjain</option>
<option>Jabalpur</option><option>Gwalior</option><option>Sagar</option>
<option>Rewa</option><option>Satna</option><option>Dewas</option>
<option>Ratlam</option><option>Khargone</option><option>Sehore</option>
<option>Vidisha</option><option>Betul</option><option>Chhindwara</option>
<option>Shivpuri</option><option>Morena</option><option>Bhind</option>
<option>Mandsaur</option><option>Neemuch</option><option>Barwani</option>
<option>Alirajpur</option><option>Damoh</option><option>Katni</option>
<option>Panna</option><option>Datia</option><option>Tikamgarh</option>
<option>Singrauli</option><option>Anuppur</option><option>Dindori</option>
<option>Umaria</option><option>Sidhi</option><option>Shahdol</option>
<option>Harda</option><option>Agar Malwa</option><option>Shajapur</option>
<option>Rajgarh</option><option>Seoni</option><option>Mandla</option>
<option>Balaghat</option><option>Ashoknagar</option><option>Sheopur</option>
<option>Burhanpur</option><option>Khandwa</option><option>Hoshangabad</option>
<option>Narsinghpur</option><option>Guna</option><option>Chhatarpur</option>
<option>Niwari</option><option>Mauganj</option>
</select>

<input id="school" placeholder="School / स्कूल">

<select id="stream" onchange="loadCourse()">
<option value="">Select Stream</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
<option>Maths</option>
<option>Other</option>
</select>

<select id="course" onchange="otherCourseShow()"></select>
<input id="otherCourse" placeholder="Other Course" style="display:none">

<input id="college" placeholder="Future College">

<select id="career">
<option>Doctor</option><option>Engineer</option><option>Govt Job</option>
<option>Business</option><option>Other</option>
</select>

<select id="travel">
<option>Self Vehicle</option>
<option>College Bus</option>
<option>Public Transport</option>
</select>

<select id="scholarship">
<option>Yes</option><option>No</option>
</select>

<select id="health">
<option>Yes</option><option>No</option>
</select>

<input id="parent1" placeholder="Parent Mobile 1">
<input id="parent2" placeholder="Parent Mobile 2">

<p>₹21 Exam Fee – Free Food + Token + Medal + Certificate</p>

<button class="pay" onclick="pay()">Pay & Register</button>

</div>

<!-- FOOTER -->
<div class="footer">
<p>
<a href="#">Privacy</a> |
<a href="#">Terms</a> |
<a href="#">Refund</a>
</p>
<p>© 2026 Banjara Digital</p>
</div>

<script>

/* COURSE */
function loadCourse(){
let data={
Science:["MBBS","BSc","Engineering","Other"],
Commerce:["BCom","CA","BBA","Other"],
Arts:["BA","LLB","UPSC","Other"],
Maths:["BSc Maths","Data Science","Other"],
Other:["Other"]
};
course.innerHTML="";
data[stream.value].forEach(c=>{
let o=document.createElement("option");
o.text=c;
course.add(o);
});
}

function otherCourseShow(){
otherCourse.style.display=(course.value=="Other")?"block":"none";
}

/* PAYMENT */
function pay(){

if(name.value=="" || mobile.value==""){
alert("Fill required fields");
return;
}

var options={
key:"rzp_live_SZnaVX76WrMx4H",
amount:2100,
currency:"INR",

handler:function(res){

fetch("https://script.google.com/macros/s/AKfycbz61bYG939JPxIt8KsG2SvCL08kYz1HWyc8O7ks-nGS9Mbn4Zd5X7KoZZt2BWXEwwaCgQ/exec",{
method:"POST",
body:JSON.stringify({
name:name.value,
parent:parent.value,
dob:dob.value,
mobile:mobile.value,
caste:caste.value,
district:district.value,
school:school.value,
stream:stream.value,
course:(course.value=="Other"?otherCourse.value:course.value),
college:college.value,
career:career.value,
travel:travel.value,
scholarship:scholarship.value,
health:health.value,
parent1:parent1.value,
parent2:parent2.value,
payment_id:res.razorpay_payment_id
})
})
.then(()=>{
alert("Payment Successful ✅");

if(confirm("WhatsApp Group join kare?")){
window.open("https://chat.whatsapp.com/F6pAgLGdTcu5soecJMh3F0");
}

})
.catch(()=>{
alert("Data save error ❌");
});

}
};

new Razorpay(options).open();
}

</script>

</body>
</html>
