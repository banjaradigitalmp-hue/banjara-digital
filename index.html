<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet 2026-27</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:#eef2f7;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#2563eb,#0040a0);
    color:white;
    text-align:center;
    padding-bottom:20px;
}
.header img{
    width:100%;
    max-height:280px;
    object-fit:cover;
}

/* CONTAINER */
.container{
    max-width:650px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

label{
    font-weight:600;
    margin-top:10px;
    display:block;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.pay{background:#2563eb;}
.mapBtn{background:#16a34a;}

/* NOTE */
.note{
    color:green;
    font-weight:600;
}

/* DIGITAL PARTNER */
.partner-box{
    text-align:center;
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background:#f8fafc;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.partner-box img{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* FOOTER */
.footer{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
.footer a{color:#38bdf8;text-decoration:none;}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

<img src="https://github.com/banjaradigitalmp-hue/student-form/blob/main/WhatsApp%20Image%202026-04-04%20at%209.41.57%20AM.jpeg?raw=true">

<h1>Student Success Meet 2026-27</h1>

<p>आयोजन: म.प्र. NGO महासंघ</p>

<div style="background:#ffffff20;margin:15px;padding:10px;border-radius:8px;">
<p>📅 10 May 2026</p>
<p>⏰ 10:00 AM</p>
<p>📍 आनंद मोहन माथुर सभागृह, विजयनगर, इंदौर</p>
</div>

<a href="https://www.google.com/maps/search/?api=1&query=Indore" target="_blank">
<button class="mapBtn">📍 View Location</button>
</a>

</div>

<!-- FORM -->
<div class="container">

<h2>Registration Form</h2>

<input id="name" placeholder="Full Name">
<input type="date" id="dob">
<input id="mobile" placeholder="Mobile">

<select id="district">
<option>District</option>
<option>Indore</option>
<option>Bhopal</option>
<option>Ujjain</option>
<option>Dhar</option>
<option>Ratlam</option>
</select>

<input id="school" placeholder="School">

<select id="stream">
<option>Stream</option>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
</select>

<input id="college" placeholder="College">

<select id="career">
<option>Career</option>
<option>Doctor</option>
<option>Engineer</option>
<option>Govt Job</option>
<option>Business</option>
</select>

<select id="travel">
<option>Travel</option>
<option>Yes</option>
<option>No</option>
</select>

<select id="scholarship">
<option>Scholarship</option>
<option>Yes</option>
<option>No</option>
</select>

<input id="health" placeholder="Health">
<input id="contact1" placeholder="Parent Contact 1">
<input id="contact2" placeholder="Parent Contact 2">

<p class="note">₹21 Registration Fee</p>

<button class="pay" onclick="payNow()">💳 Pay & Register</button>

<!-- DIGITAL PARTNER -->
<div class="partner-box">

<p style="font-weight:bold;">Digital Partner</p>

<img src="https://github.com/banjaradigitalmp-hue/student-form/blob/main/WhatsApp%20Image%202026-03-06%20at%206.52.34%20PM.jpeg?raw=true">

<h3>Banjara Digital</h3>
<p style="font-size:12px;">Connect • Create • Grow</p>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
<p>
<a href="#">Privacy</a> |
<a href="#">Terms</a> |
<a href="#">Refund</a>
</p>
<p>© 2026 Banjara Digital</p>
</div>

<script>
function payNow(){

if(name.value=="" || mobile.value==""){
alert("Fill required details");
return;
}

var options={
"key":"YOUR_API_KEY",
"amount":"2100",
"currency":"INR",

"handler":function(){

fetch("YOUR_SCRIPT_URL",{
method:"POST",
body:JSON.stringify({
name:name.value,
mobile:mobile.value
})
});

window.location.href="https://chat.whatsapp.com/YOUR_GROUP_LINK";

}
};

new Razorpay(options).open();
}
</script>

</body>
</html>
